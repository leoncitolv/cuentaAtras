name: CuentaAlerta Telegram

on:
  workflow_dispatch:
  schedule:
    - cron: "7,22,37,52 * * * *"

permissions:
  contents: write

concurrency:
  group: cuenta-alerta
  cancel-in-progress: false

jobs:
  check-reminders:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Revisar recordatorios y mandar Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          APP_TIMEZONE: ${{ vars.APP_TIMEZONE || 'America/Mexico_City' }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
        run: python scripts/check_reminders.py

      - name: Guardar historial de alertas enviadas
        run: |
          if git diff --quiet .alert_state.json; then
            echo "Sin cambios en .alert_state.json"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .alert_state.json
          git commit -m "Actualizar alertas enviadas"
          git push
